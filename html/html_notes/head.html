<!DOCTYPE html><!--Document Type Declaration-->
<html lang="en-US"><!--specify language-->  

<head><!--NOT seen on the webpage-->
        <meta charset="utf-8"><!--character encoding--> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--responsive design-->
        <title>name thats shows in the tab</title><!--webpage tab-->
        <link rel="icon" href="img/html5icon.png" type="image/x-icon"><!--icon in webpage tab-->
        <link rel="stylesheet" href="main.css" type="text/css"><!--link to external CSS file "dark mode"-->
        <meta name="author" content="z2ch"><!--author of webpage--> 
        <meta name="description" content="About your webpage"><!--describe what the webpage is about--> 
        <meta name="keywords" content="HTML, CSS, JavaScript"><!--keywords for search engines-->
        <meta name="viewport" content="width=device-width, initial-scale=1.0"><!--responsive design-->
        

        <!--Here's the correct and recommended order of elements inside the <head> section in modern HTML5:-->

        <!-- 1. Document metadata (must come first) -->
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- 2. Document title (very important for SEO & accessibility) -->
        <title>Page Title - Your Website</title>

        <!-- 3. Base URL (if needed) -->
        <!-- <base href="https://example.com/"> -->

        <!-- 4. External resources & preloading (in this recommended order) -->
        <link rel="icon" href="favicon.ico" type="image/x-icon">
        <link rel="canonical" href="https://example.com/current-page">

        <!-- Preload critical resources (fonts, CSS, etc.) -->
        <link rel="preload" href="styles.css" as="style">
        <link rel="preload" href="critical-font.woff2" as="font" type="font/woff2" crossorigin>

        <!-- 5. CSS stylesheets -->
        <link rel="stylesheet" href="styles.css">

        <!-- 6. Third-party meta tags (Open Graph, Twitter Cards, etc.) -->
        <meta property="og:title" content="Page Title">
        <meta property="og:description" content="Description here">
        <meta property="og:image" content="https://example.com/image.jpg">
        <meta name="twitter:card" content="summary_large_image">

        <!-- 7. Other meta tags -->
        <meta name="description" content="Your page description">
        <meta name="robots" content="index, follow">
        <meta name="author" content="Your Name">

        <!-- 8. JavaScript that must run early (rare) -->
        <!-- <script src="some-early-script.js" defer></script> -->

</head>

<body>  
</body>

</html>
