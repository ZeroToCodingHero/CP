<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>

        <link rel="stylesheet" href="main.css" type="text/css">
        <!-- Link to external CSS file -->
         
        <style> 
            body {
                background-color: lightblue;
            }
            h1 {
                color: white;
                text-align: center;
            }
            p {
                font-family: verdana;
                font-size: 20px;
            }
        </style>
        <!-- In-line CSS styles - Only use this for very small amounts of CSS-->

    </head>

    <body> 
        <h1>This is a heading</h1>
        
        <p style="color: blue;">This is a paragraph.</p> 
        <!-- In-line CSS styles can also be applied directly to individual elements using the "style" attribute, as shown in the paragraph above. However, this method is not recommended for larger projects or when you want to maintain a consistent design across multiple pages. It's best to use external CSS files for better organization and maintainability. -->

        <div style="color: white; background-color: black;">This is a div with inline CSS styles.</div> 
        <!-- Inline CSS style -->       
        <!-- Inline CSS style override all other styles -->
        
    </body>
</html>
