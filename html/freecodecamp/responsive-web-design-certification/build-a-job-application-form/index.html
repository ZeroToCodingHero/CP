<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Build a Job Application Form - Responsive Web Design Certification">
    <link rel="stylesheet" href="main.css">
    <title>Job Application Form</title>
</head>

<body>
    <div class="container">
        <form>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <button type="submit">Submit</button>
            <select name="position" id="position">
                <option value="one">One</option>
                <option value="two">Two</option>
            </select>

            <section class="radio-group">
                <label class="radio-option">
                    <input type="radio" name="availability" value="Available">
                    <span>Available</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="availability" value="Busy">
                    <span>Busy</span>
                </label>

                <label class="radio-option">
                    <input type="radio" name="availability" value="Away">
                    <span>Away</span>
                </label>
                </section>
                
            <textarea id="message"></textarea>
        </form>
    </div>

</body>
</html>
