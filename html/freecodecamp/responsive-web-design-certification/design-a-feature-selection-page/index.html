<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Feature Selection</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <h1>Feature Selection</h1>

    <div class="feature-card-container">

        <div class="column">
            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">Cloud Storage</span>
                    <span class="feature-desc">100 Gigabyte secure storage</span>
                </label>
            </fieldset>

            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">Dedicated Support</span>
                    <span class="feature-desc">24/7 customer help</span>
                </label>
            </fieldset>
        </div>

        <div class="column">
            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">Advanced Analytics</span>
                    <span class="feature-desc">Insights & reports</span>
                </label>
            </fieldset>

            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">Custom User themes</span>
                    <span class="feature-desc">Personalized dashboard design</span>
                </label>
            </fieldset>
        </div>

        <div class="column">
            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">Multi-User Collab</span>
                    <span class="feature-desc">Team access and sharing</span>
                </label>
            </fieldset>

            <fieldset>
                <label class="feature-card">
                    <input type="checkbox">
                    <span class="feature-title">API Access</span>
                    <span class="feature-desc">Integrate with your custom built tools</span>
                </label>
            </fieldset>
        </div>

    </div>
</body>
</html>
